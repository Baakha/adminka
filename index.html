<script>
const scriptURL = "https://script.google.com/macros/s/AKfycbyBwwx1NBtRIzqbdzq0KfdoV9JbVxO0RfMXKSw9OUnXVfzkzBqIoumTcggolLOioU626Q/exec";

async function loadAdmin() {
  const res = await fetch(scriptURL + "?admin=1&t=" + Date.now());
  const data = await res.json();

  const table = document.getElementById("table");
  table.innerHTML = "";

  let total = 0;
  const today = new Date().toISOString().split("T")[0];

  data.slice(1).forEach((row, i) => {
    const tr = document.createElement("tr");

    row.forEach(cell => {
      const td = document.createElement("td");
      td.innerText = cell;
      tr.appendChild(td);
    });

    if (row[2] === today) {
      total += Number(row[6]);
    }

    const td = document.createElement("td");
    const btn = document.createElement("button");
    btn.innerText = "❌";
    btn.onclick = async () => {
      await fetch(scriptURL, {
        method: "POST",
        body: JSON.stringify({
          action: "delete",
          rowIndex: i + 1
        })
      });
      loadAdmin();
    };

    td.appendChild(btn);
    tr.appendChild(td);

    table.appendChild(tr);
  });

  document.getElementById("income").innerText =
    "💸 Доход: " + total + " ₸";
}

loadAdmin();
setInterval(loadAdmin, 5000);
</script>
